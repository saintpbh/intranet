<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "primary-fixed": "#d2e4ff",
              "primary-fixed-dim": "#b0c8eb",
              "on-secondary-fixed": "#001a41",
              "error-container": "#ffdad6",
              "on-secondary-container": "#fefcff",
              "on-primary": "#ffffff",
              "surface-container-high": "#e8e8ed",
              "surface-dim": "#d9dade",
              "secondary-container": "#0070eb",
              "on-tertiary-fixed-variant": "#613f1c",
              "on-primary-fixed": "#001c37",
              "primary-container": "#0a2540",
              "outline": "#74777e",
              "tertiary": "#1a0b00",
              "on-tertiary-fixed": "#2d1600",
              "inverse-on-surface": "#f0f0f5",
              "on-error": "#ffffff",
              "surface-bright": "#f9f9fe",
              "primary": "#000f22",
              "on-surface": "#1a1c1f",
              "surface-container-highest": "#e2e2e7",
              "on-surface-variant": "#43474d",
              "on-background": "#1a1c1f",
              "surface-variant": "#e2e2e7",
              "tertiary-container": "#381d00",
              "background": "#f9f9fe",
              "surface-tint": "#49607e",
              "on-secondary": "#ffffff",
              "surface-container-low": "#f3f3f8",
              "inverse-primary": "#b0c8eb",
              "surface-container": "#ededf2",
              "outline-variant": "#c4c6ce",
              "on-tertiary-container": "#ae835a",
              "error": "#ba1a1a",
              "secondary": "#0058bc",
              "tertiary-fixed": "#ffdcbe",
              "on-error-container": "#93000a",
              "on-primary-fixed-variant": "#314865",
              "surface": "#f9f9fe",
              "inverse-surface": "#2e3034",
              "tertiary-fixed-dim": "#eebd90",
              "secondary-fixed": "#d8e2ff",
              "on-tertiary": "#ffffff",
              "secondary-fixed-dim": "#adc6ff",
              "on-secondary-fixed-variant": "#004493",
              "on-primary-container": "#768dad"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-transition {
            background: linear-gradient(180deg, rgba(249, 249, 254, 0) 0%, rgba(243, 243, 248, 1) 100%);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        input:focus + label,
        input:not(:placeholder-shown) + label,
        textarea:focus + label,
        textarea:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #0058bc;
        }
        .form-input-container label {
            transition: all 0.2s ease-out;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 glass-header shadow-sm shadow-slate-900/5 h-16 flex items-center justify-between px-6">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform duration-200 text-slate-900">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-slate-900">Minister Profile</h1>
</div>
<button class="active:scale-95 transition-transform duration-200 text-slate-900">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</nav>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto">
<!-- Editorial Header Section -->
<header class="mb-12">
<span class="font-label text-xs font-semibold tracking-[0.2em] text-on-surface-variant uppercase mb-3 block">Personal Records</span>
<h2 class="font-headline text-4xl font-extrabold text-primary tracking-tight leading-tight">Edit Experience</h2>
<p class="mt-4 text-on-surface-variant font-medium leading-relaxed">
                Refine your ministry journey. Your service records help the community understand your spiritual path and expertise.
            </p>
</header>
<!-- Form Section -->
<form class="space-y-8">
<!-- Period Input -->
<div class="relative form-input-container">
<div class="bg-surface-container-high rounded-xl px-5 pt-7 pb-3 transition-all duration-300 focus-within:ring-2 focus-within:ring-secondary/20">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-semibold placeholder-transparent" id="period" name="period" placeholder=" " type="text" value="2018.03 - 2023.12"/>
<label class="absolute left-5 top-5 text-on-surface-variant font-label text-sm font-medium" for="period">기간 (Period)</label>
</div>
</div>
<!-- Organization Input -->
<div class="relative form-input-container">
<div class="bg-surface-container-high rounded-xl px-5 pt-7 pb-3 transition-all duration-300 focus-within:ring-2 focus-within:ring-secondary/20">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-semibold placeholder-transparent" id="organization" name="organization" placeholder=" " type="text" value="Grace Community Church"/>
<label class="absolute left-5 top-5 text-on-surface-variant font-label text-sm font-medium" for="organization">소속 (Church/Organization)</label>
</div>
</div>
<!-- Role Input -->
<div class="relative form-input-container">
<div class="bg-surface-container-high rounded-xl px-5 pt-7 pb-3 transition-all duration-300 focus-within:ring-2 focus-within:ring-secondary/20">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-semibold placeholder-transparent" id="role" name="role" placeholder=" " type="text" value="Lead Pastor of Youth Ministry"/>
<label class="absolute left-5 top-5 text-on-surface-variant font-label text-sm font-medium" for="role">직분 (Role)</label>
</div>
</div>
<!-- Description Input -->
<div class="relative form-input-container">
<div class="bg-surface-container-high rounded-xl px-5 pt-7 pb-3 transition-all duration-300 focus-within:ring-2 focus-within:ring-secondary/20">
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-on-surface font-medium placeholder-transparent resize-none leading-relaxed" id="description" name="description" placeholder=" " rows="5">Oversaw spiritual growth for 200+ students, developed curriculum for seasonal retreats, and pioneered the regional outreach program for local high schools.</textarea>
<label class="absolute left-5 top-5 text-on-surface-variant font-label text-sm font-medium" for="description">주요 사역 (Description)</label>
</div>
</div>
<!-- Visual Decoration / Context Image -->
<div class="pt-4">
<div class="w-full h-48 rounded-lg overflow-hidden relative group">
<img alt="Ministry Atmosphere" class="w-full h-full object-cover grayscale opacity-40 transition-transform duration-700 group-hover:scale-105" data-alt="Modern minimalist church interior with soft natural light streaming through high windows onto wooden pews" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCT-249L35CQMihqQripwiFz4wx5Zz82c-IFZsGwF6qBXTwgtYKvTv-x_I19eBdN-vvTaW0nPKUz3UJ-ihPAWd4IxLV4CG3ydI0L8-MDVlyEWfLvMn2mZ47Ea3tg6cMpReRVVTsHaQ4rvxs51P7HLoDdJDiEd9ll_iJdFzEG2gKLfVsUgM1X3pVZDeztnCZdazlGvDeoyzV7ldK7z1JAET0bDnD_fMCaABT9kaxGZsoZJ5k2uqZkUQgooLIx2K1nBGxxFAV8Y_psusI"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface to-transparent"></div>
<div class="absolute bottom-6 left-6">
<p class="text-xs font-label font-bold text-on-surface-variant tracking-widest uppercase">Atmosphere of Service</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 pt-6">
<button class="w-full h-14 rounded-full bg-gradient-to-r from-secondary to-secondary-container text-white font-headline font-bold text-lg shadow-[0_20px_40px_rgba(0,88,188,0.15)] active:scale-[0.98] transition-all" type="submit">
                    저장 (Save)
                </button>
<button class="w-full h-14 rounded-full border border-outline-variant/30 text-on-surface font-headline font-semibold active:scale-[0.98] transition-all" type="button">
                    취소 (Cancel)
                </button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 h-20 bg-white/80 backdrop-blur-2xl rounded-t-[32px] shadow-[0_-10px_40px_rgba(10,37,64,0.06)]">
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[24px]" data-icon="church">church</span>
<span class="font-label text-[11px] font-medium tracking-wide mt-1">Sanctuary</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[24px]" data-icon="menu_book">menu_book</span>
<span class="font-label text-[11px] font-medium tracking-wide mt-1">Ministry</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400">
<span class="material-symbols-outlined text-[24px]" data-icon="auto_graph">auto_graph</span>
<span class="font-label text-[11px] font-medium tracking-wide mt-1">Growth</span>
</div>
<!-- Active Tab: Profile -->
<div class="flex flex-col items-center justify-center text-blue-600 after:content-[''] after:w-1 after:h-1 after:bg-blue-600 after:rounded-full after:mt-1">
<span class="material-symbols-outlined text-[24px]" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label text-[11px] font-medium tracking-wide">Profile</span>
</div>
</nav>
</body></html>
