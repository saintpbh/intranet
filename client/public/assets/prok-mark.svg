<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4DBFEF"/>
      <stop offset="100%" stop-color="#2B8BC7"/>
    </linearGradient>
    <linearGradient id="triGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#9B4DCA"/>
      <stop offset="100%" stop-color="#6B2FA0"/>
    </linearGradient>
  </defs>
  <!-- Background (for maskable icon safe zone) -->
  <rect width="512" height="512" rx="0" fill="url(#bgGrad)"/>
  <!-- Main circle - sky blue -->
  <circle cx="256" cy="256" r="180" fill="url(#circleGrad)"/>
  <!-- Cross/triangle shape - purple (기장 마크 stylized) -->
  <g transform="translate(256, 256)">
    <!-- Triangular shape pointing up-right -->
    <polygon points="-30,-120 100,60 -120,60" fill="url(#triGrad)" opacity="0.95"/>
    <!-- White cross overlay -->
    <rect x="-12" y="-100" width="24" height="160" fill="#FFFFFF" rx="4" opacity="0.95"/>
    <rect x="-70" y="-12" width="140" height="24" fill="#FFFFFF" rx="4" opacity="0.95"/>
    <!-- Accent line -->
    <line x1="-80" y1="70" x2="80" y2="70" stroke="#FFFFFF" stroke-width="3" opacity="0.4"/>
  </g>
</svg>
