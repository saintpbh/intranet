<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Naver Map Test</title>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; }
        #map { width: 100%; height: 100%; }
        #status { position: absolute; z-index: 999; top: 10px; left: 10px; padding: 10px; background: rgba(255,255,255,0.9); border-radius: 5px; font-weight: bold; }
    </style>
    <!-- Use ncpKeyId instead of ncpClientId as per recent Naver Maps API V3 update -->
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=a7lrosytn2"></script>
</head>
<body>
    <div id="status">지도 로딩 중...</div>
    <div id="map"></div>

    <script>
        var mapOptions = {
            center: new naver.maps.LatLng(37.5665, 126.9780),
            zoom: 10
        };

        try {
            var map = new naver.maps.Map('map', mapOptions);
            
            naver.maps.Event.addListener(map, 'tilesloaded', function() {
                document.getElementById('status').innerText = '✅ 지도 타일 로드 성공! (ncpKeyId 사용)';
                document.getElementById('status').style.color = 'green';
            });
        } catch (e) {
            document.getElementById('status').innerText = '❌ 오류: ' + e.message;
            document.getElementById('status').style.color = 'red';
        }
    </script>
</body>
</html>
